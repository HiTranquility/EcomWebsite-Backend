services:
  api:
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      ASPNETCORE_Kestrel__Endpoints__Https__Certificate__Path: /https/prodcert.pfx
    volumes:
      - ./certs/prod:/https:ro
    ports:
      - "${API_HTTP_PORT:-80}:${API_CONTAINER_HTTP_PORT:-8080}"
      - "${API_HTTPS_PORT:-443}:${API_CONTAINER_HTTPS_PORT:-8443}"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true

  mysql:
    env_file:
      - .env.prod
    ports: []

  redis:
    env_file:
      - .env.prod
    ports: []

  rabbitmq:
    env_file:
      - .env.prod
    ports: []

  aspire-dashboard:
    profiles:
      - never

