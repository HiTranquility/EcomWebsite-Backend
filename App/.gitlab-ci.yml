# =============================
# 🟦 C# .NET DevSecOps Pipeline
# =============================

stages:
  - ci              # 1. Build, Lint, Test
  - security        # 2. Security Scan
  - docker          # 3. Docker Build & Scan
  - deploy          # 4. Deploy
  - dast            # 5. DAST Scan
  - docs            # 6. Docs Build
  - schedule        # 7. Scheduled Tasks
  - notify          # 8. Notifications
  - cleanup         # 9. Cleanup
  - backup          # 10. Backup
  - monitoring      # 11. Monitoring Setup
  - compliance      # 12. Compliance Check
  - performance     # 13. Performance Test
  - smoke           # 14. Smoke Test
  - rollback        # 15. Rollback (manual)
  - health          # 16. Health Check

variables:
  DOTNET_VERSION: "9.0"
  DOCKER_REGISTRY: "ghcr.io"
  IMAGE_NAME: "${DOCKER_REGISTRY}/${CI_PROJECT_PATH}"
  DOCKERFILE_PATH: "App/Dockerfile"
  DOCKER_BUILD_CONTEXT: ".."

# ============================================
# 1️⃣ CI - BUILD, LINT, TEST
# ============================================
build:
  stage: ci
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - ~/.nuget/packages/
  script:
    - cd App
    - dotnet restore
    - dotnet build --configuration Release --no-restore
  artifacts:
    paths:
      - App/**/bin/Release/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "staging"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:
  stage: ci
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}
  script:
    - cd App
    - dotnet tool install -g dotnet-format || true
    - dotnet format --verify-no-changes || true
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "staging"

test_unit:
  stage: ci
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}
  script:
    - cd App
    - |
      if [ -d "../App.TEST" ]; then
        dotnet test ../App.TEST/App.TEST.csproj \
          --filter "Category=Unit" \
          --no-build \
          --verbosity normal \
          --collect:"XPlat Code Coverage" || true
      fi
  artifacts:
    paths:
      - App.TEST/**/TestResults/
    expire_in: 7 days
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "staging"

test_integration:
  stage: ci
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}
  services:
    - docker:dind
  before_script:
    - docker compose -f App/docker-compose.yml -f App/docker-compose.dev.yml up -d mysql redis
    - sleep 10  # Wait for services
  script:
    - cd App
    - |
      if [ -d "../App.TEST" ]; then
        dotnet test ../App.TEST/App.TEST.csproj \
          --filter "Category=Integration" \
          --no-build \
          --verbosity normal || true
      fi
  after_script:
    - docker compose -f App/docker-compose.yml -f App/docker-compose.dev.yml down
  needs: ["build"]
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"  # Chỉ chạy integration test trên staging

# ============================================
# 2️⃣ SECURITY SCAN (SAST + SCA + Secret)
# ============================================
security_sast:
  stage: security
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}
  script:
    - cd App
    # SAST - Static Analysis
    - dotnet tool install -g dotnet-sonarscanner || true
    # Có thể dùng: sonar-scanner hoặc CodeQL
    - dotnet list package --vulnerable || true
  artifacts:
    reports:
      sast: gl-sast-report.json
  needs: ["lint"]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "staging"

security_sca:
  stage: security
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}
  script:
    - cd App
    # SCA - Dependency Scanning
    - dotnet list package --vulnerable --include-transitive || true
    # Có thể dùng: dotnet tool install -g dotnet-retire
  artifacts:
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
  needs: ["lint"]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "staging"

security_secret:
  stage: security
  image: alpine:latest
  script:
    - apk add --no-cache git
    # Secret Scanning với GitLeaks
    - |
      wget -q -O /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
      tar -xzf /tmp/gitleaks.tar.gz -C /tmp
      /tmp/gitleaks detect --source . --no-git -v || true
  artifacts:
    reports:
      secret_detection: gl-secret-detection-report.json
  needs: ["lint"]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "staging"

# ============================================
# 3️⃣ DOCKER BUILD & SCAN
# ============================================
docker_build_develop:
  stage: docker
  image: docker:stable
  services:
    - docker:dind
  before_script:
    - echo $GITHUB_TOKEN | docker login ${DOCKER_REGISTRY} -u ${GITHUB_USERNAME} --password-stdin
  script:
    - cd App
    - |
      docker build \
        -t ${IMAGE_NAME}:develop-${CI_COMMIT_SHORT_SHA} \
        -t ${IMAGE_NAME}:develop-latest \
        -f Dockerfile \
        ${DOCKER_BUILD_CONTEXT}
    - docker push ${IMAGE_NAME}:develop-${CI_COMMIT_SHORT_SHA}
    - docker push ${IMAGE_NAME}:develop-latest
  needs: ["security_sast", "security_sca", "security_secret"]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  only:
    - develop

docker_build_staging:
  stage: docker
  image: docker:stable
  services:
    - docker:dind
  before_script:
    - echo $GITHUB_TOKEN | docker login ${DOCKER_REGISTRY} -u ${GITHUB_USERNAME} --password-stdin
  script:
    - cd App
    - |
      docker build \
        -t ${IMAGE_NAME}:staging-${CI_COMMIT_SHORT_SHA} \
        -t ${IMAGE_NAME}:staging-latest \
        -f Dockerfile \
        ${DOCKER_BUILD_CONTEXT}
    - docker push ${IMAGE_NAME}:staging-${CI_COMMIT_SHORT_SHA}
    - docker push ${IMAGE_NAME}:staging-latest
  needs: ["security_sast", "security_sca", "security_secret"]
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  only:
    - staging

docker_scan:
  stage: docker
  image: aquasec/trivy:latest
  script:
    - |
      trivy image \
        --format template \
        --template "@contrib/gitlab.tpl" \
        -o gl-container-scanning-report.json \
        ${IMAGE_NAME}:${CI_COMMIT_BRANCH}-latest || true
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
  needs: 
    - job: docker_build_develop
      optional: true
    - job: docker_build_staging
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "staging"

# ============================================
# 4️⃣ DEPLOY
# ============================================
deploy_staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$EC2_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $EC2_STAGING_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no ${EC2_STAGING_USER}@${EC2_STAGING_HOST} << 'EOF'
        set -e
        
        echo "🚀 Starting staging deployment..."
        cd ${EC2_STAGING_DEPLOY_PATH}
        
        # Verify required files exist
        if [ ! -f "docker-compose.yml" ] || [ ! -f "docker-compose.stag.yml" ] || [ ! -f ".env.stag" ]; then
          echo "❌ Error: Required files not found!"
          echo "   Please ensure docker-compose.yml, docker-compose.stag.yml, and .env.stag exist in ${EC2_STAGING_DEPLOY_PATH}"
          exit 1
        fi
        
        # Login to GitHub Container Registry
        echo "🔐 Logging in to GitHub Container Registry..."
        echo ${GITHUB_TOKEN} | docker login ghcr.io -u ${GITHUB_USERNAME} --password-stdin
        
        # Pull latest image
        echo "📦 Pulling latest Docker image: ${IMAGE_NAME}:staging-latest"
        docker pull ${IMAGE_NAME}:staging-latest || {
          echo "⚠️ Warning: Failed to pull image, using existing image if available"
        }
        
        # Stop old containers (graceful shutdown)
        echo "🛑 Stopping old containers..."
        docker compose -f docker-compose.yml -f docker-compose.stag.yml --env-file .env.stag down || true
        
        # Start new containers with latest image
        echo "▶️ Starting new containers..."
        docker compose -f docker-compose.yml -f docker-compose.stag.yml --env-file .env.stag up -d
        
        # Wait for services to be healthy
        echo "⏳ Waiting for services to be healthy..."
        sleep 15
        
        # Verify deployment
        echo "✅ Verifying deployment..."
        docker compose -f docker-compose.yml -f docker-compose.stag.yml --env-file .env.stag ps
        
        # Check API health
        echo "🏥 Checking API health..."
        sleep 5
        curl -f http://localhost:${API_HTTP_PORT:-5095}/health || echo "⚠️ Warning: Health check failed, but deployment completed"
        
        # Clean up old images
        echo "🧹 Cleaning up old images..."
        docker image prune -f
        
        echo "✅ Deployment completed successfully!"
      EOF
  environment:
    name: staging
    url: http://${EC2_STAGING_HOST}:${API_HTTP_PORT:-5095}
  needs: ["docker_build_staging", "docker_scan"]
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  only:
    - staging
  when: manual  # Tech lead control

deploy_production:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploy to production via ArgoCD/GitOps"
    # ArgoCD sẽ tự sync từ repo infra
  environment:
    name: production
    url: https://production.yourdomain.com
  needs: ["docker_build_staging"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  only:
    - main
  when: manual

# ============================================
# 5️⃣ DAST SCAN
# ============================================
dast:
  stage: dast
  image: owasp/zap2docker-stable
  script:
    - zap-baseline.py -t ${STAGING_URL} -r zap-report.html || true
  artifacts:
    paths:
      - zap-report.html
    reports:
      dast: zap-report.html
  needs: ["deploy_staging"]
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  only:
    - staging
  allow_failure: true

# ============================================
# 6️⃣ DOCS BUILD
# ============================================
docs:
  stage: docs
  image: mcr.microsoft.com/dotnet/sdk:${DOTNET_VERSION}
  script:
    - dotnet tool install -g docfx || true
    - docfx docs/docfx.json || true
  artifacts:
    paths:
      - docs/_site
    expire_in: 30 days
  rules:
    - changes:
        - docs/**/*
  needs: []

# ============================================
# 7️⃣ SCHEDULE (chạy định kỳ)
# ============================================
schedule_cleanup:
  stage: schedule
  image: alpine:latest
  script:
    - echo "Running scheduled cleanup tasks"
    # Cleanup old images, logs, etc.
  only:
    - schedules
  needs: []

schedule_backup:
  stage: schedule
  image: alpine:latest
  script:
    - echo "Running scheduled backup"
  only:
    - schedules
  needs: []

# ============================================
# 8️⃣ NOTIFY
# ============================================
notify:
  stage: notify
  image: curlimages/curl:latest
  script:
    - |
      STATUS=${CI_JOB_STATUS}
      MSG="*Pipeline:* ${CI_PROJECT_NAME}\n*Branch:* ${CI_COMMIT_BRANCH}\n*Status:* ${STATUS}\n*Commit:* ${CI_COMMIT_SHORT_SHA}"
      curl -X POST -H "Content-Type: application/json" \
           -d "{\"text\": \"${MSG}\"}" \
           ${SLACK_WEBHOOK_URL} || true
  when: always
  needs: []

# ============================================
# 9️⃣ CLEANUP
# ============================================
cleanup_artifacts:
  stage: cleanup
  image: alpine:latest
  script:
    - echo "Cleanup old artifacts and images"
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  needs: []

# ============================================
# 🔟 BACKUP
# ============================================
backup_database:
  stage: backup
  image: alpine:latest
  script:
    - echo "Backup database before deployment"
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  when: manual
  needs: []

# ============================================
# 1️⃣1️⃣ MONITORING
# ============================================
monitoring_setup:
  stage: monitoring
  image: alpine:latest
  script:
    - echo "Setup monitoring and alerts"
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  needs: ["deploy_staging"]

# ============================================
# 1️⃣2️⃣ COMPLIANCE
# ============================================
compliance_check:
  stage: compliance
  image: alpine:latest
  script:
    - echo "Check compliance (GDPR, SOC2, etc.)"
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  needs: ["security_sast"]

# ============================================
# 1️⃣3️⃣ PERFORMANCE TEST
# ============================================
performance_test:
  stage: performance
  image: alpine:latest
  script:
    - echo "Run performance tests (k6, JMeter, etc.)"
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  needs: ["deploy_staging"]
  allow_failure: true

# ============================================
# 1️⃣4️⃣ SMOKE TEST
# ============================================
smoke_test:
  stage: smoke
  image: alpine:latest
  script:
    - |
      curl -f ${STAGING_URL}/health || exit 1
      echo "Smoke test passed"
  needs: ["deploy_staging"]
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"

# ============================================
# 1️⃣5️⃣ ROLLBACK (Manual)
# ============================================
rollback:
  stage: rollback
  image: alpine:latest
  script:
    - echo "Rollback to previous version"
  when: manual
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"

# ============================================
# 1️⃣6️⃣ HEALTH CHECK
# ============================================
health_check:
  stage: health
  image: alpine:latest
  script:
    - |
      curl -f ${STAGING_URL}/health || exit 1
      echo "Health check passed"
  needs: ["deploy_staging"]
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  when: always