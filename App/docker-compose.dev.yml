# ============================================
# Development Environment Overrides
# ============================================
# This file overrides base configuration from docker-compose.yml
# for development environment specific settings.

services:
  api:
    env_file:
      - .env.dev
      
    build:
      context: ..
      dockerfile: App/Dockerfile
    
    # Expose ports for local development access
    ports:
      - "${API_HTTP_PORT:-5095}:${API_CONTAINER_HTTP_PORT:-8080}"
    
    # Mount development certificates
    # volumes:
    #   - ./certs/dev:/https:ro
    
    # Uncomment for live-reload during development (hot reload)
    # volumes:
    #   - ../App:/src/App:rw
    #   - ./certs:/https:ro

  # ============================================
  # MySQL Service - Dev Overrides
  # ============================================
  mysql:
    # Development environment file
    env_file:
      - .env.dev
    
    # MySQL environment variables (override from .env.dev if needed)
    # Note: MYSQL_USER và MYSQL_PASSWORD chỉ dùng cho user thường, KHÔNG dùng cho root
    # Để login từ máy ngoài qua port 3308, chỉ cần dùng: mysql -h 127.0.0.1 -P 3308 -uroot -pCaVN2004

    # Expose MySQL port for local development access
    ports:
      - "${MYSQL_HTTP_PORT:-3308}:${MYSQL_CONTAINER_HTTP_PORT:-3306}"

  # ============================================
  # Redis Service - Dev Overrides
  # ============================================
  redis:
    # Development environment file
    env_file:
      - .env.dev
    
    # Expose Redis port for local development access
    ports:
      - "${REDIS_HTTP_PORT:-6380}:${REDIS_CONTAINER_HTTP_PORT:-6379}"

  # ============================================
  # RabbitMQ Service - Dev Overrides
  # ============================================
  rabbitmq:
    # Development environment file
    env_file:
      - .env.dev
    
    # Expose RabbitMQ ports for local development access
    # Port 5672: AMQP protocol
    # Port 15672: Management UI (only in dev)
    ports:
      - "${RABBITMQ_HTTP_PORT:-5673}:${RABBITMQ_CONTAINER_HTTP_PORT:-5672}"
      - "${RABBITMQ_MGMT_HTTP_PORT:-15672}:${RABBITMQ_CONTAINER_MGMT_HTTP_PORT:-15672}"

  # ============================================
  # RedisInsight Service - Dev Overrides
  # ============================================
  redisinsight:
    # Development environment file
    env_file:
      - .env.dev
    
    # Expose RedisInsight UI port for local development access
    # Access at http://localhost:8001
    ports:
      - "${REDISINSIGHT_HTTP_PORT:-8001}:${REDISINSIGHT_CONTAINER_HTTP_PORT:-8001}"
    
    # Optional: Mount volume để persist RedisInsight data
    # volumes:
    #   - redisinsight-data:/data

  # ============================================
  # Aspire Dashboard Service - Dev Overrides
  # ============================================
  aspire-dashboard:
    env_file:
      - .env.dev
    
    environment:
      # Override với prefix riêng cho Aspire Dashboard
      ASPNETCORE_URLS: ${ASPIRE_ASPNETCORE_URLS:-http://+:18888}
      # ASPNETCORE_Kestrel__Endpoints__Https__Url: ${ASPIRE_ASPNETCORE_Kestrel__Endpoints__Https__Url:-}
      # ASPNETCORE_Kestrel__Endpoints__Https__Certificate__Path: ${ASPIRE_ASPNETCORE_Kestrel__Endpoints__Https__Certificate__Path:-}
      # ASPNETCORE_Kestrel__Endpoints__Https__Certificate__Password: ${ASPIRE_ASPNETCORE_Kestrel__Endpoints__Https__Certificate__Password:-}
    
    ports:
      - "${ASPIRE_HTTP_PORT:-18888}:${ASPIRE_CONTAINER_HTTP_PORT:-18888}"

