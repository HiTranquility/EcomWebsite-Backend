services:
  api:
    env_file:
      - .env.stag
    environment:
      ASPNETCORE_Kestrel__Endpoints__Https__Certificate__Path: /https/stagingcert.pfx
    volumes:
      - ./certs/staging:/https:ro
    ports:
      - "${API_HTTP_PORT:-5095}:${API_CONTAINER_HTTP_PORT:-8080}"
      - "${API_HTTPS_PORT:-5096}:${API_CONTAINER_HTTPS_PORT:-8443}"

  mysql:
    env_file:
      - .env.stag
    # Prefer not exposing in staging; comment out to expose if needed
    # expose:
    #   - "${MYSQL_CONTAINER_HTTP_PORT:-3306}"
    ports: []

  redis:
    env_file:
      - .env.stag
    # expose:
    #   - "${REDIS_CONTAINER_HTTP_PORT:-6379}"
    ports: []

  rabbitmq:
    env_file:
      - .env.stag
    # expose:
    #   - "${RABBITMQ_CONTAINER_HTTP_PORT:-5672}"
    ports: []

