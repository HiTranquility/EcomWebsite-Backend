# ============================================
# Staging Environment Overrides
# ============================================
# This file overrides base configuration from docker-compose.yml
# for staging environment specific settings.
# Staging follows production-like security but with exposed ports for testing.

services:
  # ============================================
  # API Service - Staging Overrides
  # ============================================
  api:
    # Staging environment file
    env_file:
      - .env.stag

    # Expose ports for staging access (typically behind load balancer)
    ports:
      - "${API_HTTP_PORT:-5095}:${API_CONTAINER_HTTP_PORT:-8080}"
      # - "${API_HTTPS_PORT:-5096}:${API_CONTAINER_HTTPS_PORT:-8443}"
    
    # Mount staging certificates
    # volumes:
    #  - ./certs/staging:/https:ro

  # ============================================
  # MySQL Service - Staging Overrides
  # ============================================
  mysql:
    # Staging environment file
    env_file:
      - .env.stag
    
    # Do not expose MySQL port externally (security best practice)
    # Services communicate via internal Docker network
    ports: 
      - "${MYSQL_HTTP_PORT:-3308}:${MYSQL_CONTAINER_HTTP_PORT:-3306}"

  # ============================================
  # Redis Service - Staging Overrides
  # ============================================
  redis:
    # Staging environment file
    env_file:
      - .env.stag
    
    # Do not expose Redis port externally (security best practice)
    # Services communicate via internal Docker network
    ports:
      - "${REDIS_HTTP_PORT:-6380}:${REDIS_CONTAINER_HTTP_PORT:-6379}"

  # ============================================
  # RabbitMQ Service - Staging Overrides
  # ============================================
  rabbitmq:
    # Staging environment file
    env_file:
      - .env.stag
    
    # Do not expose RabbitMQ ports externally (security best practice)
    # Services communicate via internal Docker network
    ports:
      - "${RABBITMQ_HTTP_PORT:-5673}:${RABBITMQ_CONTAINER_HTTP_PORT:-5672}"

  # ============================================
  # Aspire Dashboard Service - Staging Overrides
  # ============================================
  # Note: Aspire Dashboard is typically disabled in staging
  # Uncomment and configure if needed for staging monitoring
  # aspire-dashboard:
  #   profiles:
  #     - never

